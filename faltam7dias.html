<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Faltam 7 dias – Festa da Maria Alice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #f7ebe0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: #fffaf3;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      border: 4px solid #f4b6c4;
    }

    .top-banner {
      background: linear-gradient(135deg, #f9d7e2, #ffe7b8);
      padding: 12px 18px;
      text-align: center;
      border-bottom: 3px solid #f4b6c4;
    }

    .top-banner span {
      font-size: 18px;
      font-weight: 700;
      color: #bf7c1d;
      letter-spacing: 1px;
    }

    .content {
      padding: 18px 18px 22px;
      text-align: center;
    }

    .number-big {
      font-size: 64px;
      font-weight: 800;
      color: #f2a012;
      text-shadow: 0 3px 0 #fff, 0 5px 10px rgba(0,0,0,0.25);
      margin-bottom: 6px;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .text-main {
      font-size: 22px;
      line-height: 1.3;
      color: #6b3b1d;
      margin-bottom: 14px;
      animation: fadeUp 1s ease-out forwards;
      opacity: 0;
      animation-delay: 0.2s;
    }

    .text-main strong {
      color: #d67a2c;
    }

    .subtext {
      font-size: 15px;
      color: #8d5b34;
      margin-bottom: 14px;
      animation: fadeUp 1s ease-out forwards;
      opacity: 0;
      animation-delay: 0.5s;
    }

    .photo-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-top: 8px;
      animation: floatIn 1.1s ease-out forwards;
      opacity: 0;
      transform: translateY(25px) scale(0.96);
      animation-delay: 0.6s;
    }

    .photo-wrapper img {
      width: 100%;
      display: block;
      height: auto;
    }

    .sparkle {
      position: absolute;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff9d1, #ffc857 55%, transparent 70%);
      opacity: 0.9;
      animation: sparkle 2.3s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .sparkle.s1 { top: 10%; left: 8%; animation-delay: 0s; }
    .sparkle.s2 { top: 15%; right: 10%; animation-delay: 0.4s; }
    .sparkle.s3 { bottom: 8%; left: 15%; animation-delay: 0.8s; }
    .sparkle.s4 { bottom: 12%; right: 15%; animation-delay: 1.2s; }

    .bottom-note {
      margin-top: 14px;
      font-size: 14px;
      color: #8b5c2e;
      animation: fadeUp 1s ease-out forwards;
      opacity: 0;
      animation-delay: 0.9s;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
      55% { transform: translateY(2px); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(35px) scale(0.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes sparkle {
      from { transform: scale(0.7); opacity: 0.0; }
      to { transform: scale(1.1); opacity: 1; }
    }

    @media (max-width: 480px) {
      .card { border-width: 3px; }
      .number-big { font-size: 52px; }
      .text-main { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-banner">
      <span>Contagem regressiva!</span>
    </div>

    <div class="content">
      <div class="number-big">7</div>

      <div class="text-main">
        Faltam <strong>7 dias</strong><br>
        para a festa da<br>
        <strong>Maria Alice</strong>!
      </div>

      <div class="subtext">
        Ela já está aqui se divertindo com os amiguinhos da selva
        e esperando você para brincar também.
      </div>

      <div class="photo-wrapper">
        <!-- TROQUE o src pela URL da foto dela com os animais -->
        <img src="https://i.imgur.com/0Sh44vA.jpeg" alt="Maria Alice com os animais">

        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
      </div>

      <div class="bottom-note">
        Guarde essa data com carinho e prepare o coração:
        vai ser um dia cheio de sorrisos, abraços e muita diversão!
      </div>
    </div>
  </div>
</body>
</html>
